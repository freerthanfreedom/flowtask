<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="심플하고 직관적인 업무 관리 시스템. 업무, 세부업무, 기한, 진행상황을 쉽게 관리하세요.">
    <title>FlowTask — 업무 관리</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ============ Loading Screen ============ -->
    <div id="loading-screen" class="screen-overlay">
        <div class="loader">
            <div class="loader-spinner"></div>
            <p>잠시만 기다려 주세요...</p>
        </div>
    </div>

    <!-- ============ Login Screen ============ -->
    <div id="login-screen" class="screen-overlay" style="display: none;">
        <div class="login-card">
            <div class="login-logo">
                <svg width="44" height="44" viewBox="0 0 28 28" fill="none">
                    <rect x="2" y="2" width="10" height="10" rx="3" fill="url(#lg1)" />
                    <rect x="16" y="2" width="10" height="10" rx="3" fill="url(#lg2)" opacity="0.6"/>
                    <rect x="2" y="16" width="10" height="10" rx="3" fill="url(#lg2)" opacity="0.6"/>
                    <rect x="16" y="16" width="10" height="10" rx="3" fill="url(#lg1)"/>
                    <defs>
                        <linearGradient id="lg1" x1="0" y1="0" x2="28" y2="28">
                            <stop stop-color="#6C5CE7"/>
                            <stop offset="1" stop-color="#a29bfe"/>
                        </linearGradient>
                        <linearGradient id="lg2" x1="0" y1="0" x2="28" y2="28">
                            <stop stop-color="#fd79a8"/>
                            <stop offset="1" stop-color="#e17055"/>
                        </linearGradient>
                    </defs>
                </svg>
                <span>FlowTask</span>
            </div>
            <p class="login-tagline">여러 기기에서<br>업무를 쉽게 관리하세요</p>
            <button id="btn-google-signin" class="google-signin-btn">
                <svg width="20" height="20" viewBox="0 0 48 48">
                    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                    <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                    <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                </svg>
                <span>Google로 시작하기</span>
            </button>
            <p class="login-footnote">로그인하면 모든 기기에서<br>동일한 데이터에 접근할 수 있습니다.</p>
        </div>
    </div>

    <!-- ============ App ============ -->
    <div id="app" style="display: none;">

        <!-- Header -->
        <header id="app-header">
            <div class="header-left">
                <div class="logo" id="logo">
                    <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                        <rect x="2" y="2" width="10" height="10" rx="3" fill="url(#g1)" />
                        <rect x="16" y="2" width="10" height="10" rx="3" fill="url(#g2)" opacity="0.6"/>
                        <rect x="2" y="16" width="10" height="10" rx="3" fill="url(#g2)" opacity="0.6"/>
                        <rect x="16" y="16" width="10" height="10" rx="3" fill="url(#g1)"/>
                        <defs>
                            <linearGradient id="g1" x1="0" y1="0" x2="28" y2="28">
                                <stop stop-color="#6C5CE7"/>
                                <stop offset="1" stop-color="#a29bfe"/>
                            </linearGradient>
                            <linearGradient id="g2" x1="0" y1="0" x2="28" y2="28">
                                <stop stop-color="#fd79a8"/>
                                <stop offset="1" stop-color="#e17055"/>
                            </linearGradient>
                        </defs>
                    </svg>
                    <span>FlowTask</span>
                </div>
            </div>
            <div class="header-center">
                <div class="stats-bar" id="stats-bar">
                    <div class="stat-chip" id="stat-total">
                        <span class="stat-label">전체</span>
                        <span class="stat-value">0</span>
                    </div>
                    <div class="stat-chip stat-progress" id="stat-progress">
                        <span class="stat-label">진행 중</span>
                        <span class="stat-value">0</span>
                    </div>
                    <div class="stat-chip stat-done" id="stat-done">
                        <span class="stat-label">완료</span>
                        <span class="stat-value">0</span>
                    </div>
                </div>
            </div>
            <div class="header-right">
                <div class="user-profile" id="user-profile">
                    <img class="user-avatar" id="user-avatar" src="" alt="프로필" />
                    <span class="user-name" id="user-name"></span>
                    <button class="btn-signout" id="btn-signout" title="로그아웃">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                            <path d="M6 2H4a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h2M10.5 11.5L14 8l-3.5-3.5M14 8H6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main id="main-content">
            <!-- Filter Bar -->
            <div class="filter-bar" id="filter-bar">
                <div class="filter-tabs">
                    <button class="filter-tab active" data-filter="all" id="filter-all">전체</button>
                    <button class="filter-tab" data-filter="todo" id="filter-todo">할 일</button>
                    <button class="filter-tab" data-filter="in-progress" id="filter-in-progress">진행 중</button>
                    <button class="filter-tab" data-filter="done" id="filter-done">완료</button>
                </div>
                <button class="btn-add-task" id="btn-add-task">
                    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                        <path d="M9 3v12M3 9h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    <span>새 업무</span>
                </button>
            </div>

            <!-- Task Loading Indicator -->
            <div class="task-loading" id="task-loading" style="display: none;">
                <div class="loader-spinner small"></div>
                <span>업무를 불러오는 중...</span>
            </div>

            <!-- Task List -->
            <div class="task-list" id="task-list"></div>

            <!-- Empty State -->
            <div class="empty-state" id="empty-state" style="display: none;">
                <div class="empty-icon">
                    <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
                        <rect x="8" y="12" width="48" height="40" rx="8" stroke="url(#eg1)" stroke-width="2" fill="none" opacity="0.4"/>
                        <path d="M24 30h16M24 38h10" stroke="url(#eg1)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
                        <circle cx="18" cy="30" r="2" fill="#6C5CE7" opacity="0.6"/>
                        <circle cx="18" cy="38" r="2" fill="#6C5CE7" opacity="0.6"/>
                        <defs>
                            <linearGradient id="eg1" x1="8" y1="12" x2="56" y2="52">
                                <stop stop-color="#6C5CE7"/>
                                <stop offset="1" stop-color="#a29bfe"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <h2>아직 업무가 없어요</h2>
                <p>"새 업무" 버튼을 눌러 첫 번째 업무를 추가해 보세요.</p>
            </div>
        </main>

    </div><!-- /app -->

    <!-- ============ Add/Edit Task Modal ============ -->
    <div class="modal-overlay" id="modal-overlay" style="display: none;">
        <div class="modal" id="task-modal">
            <div class="modal-header">
                <h2 id="modal-title">새 업무 추가</h2>
                <button class="modal-close" id="modal-close" aria-label="닫기">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                        <path d="M5 5l10 10M15 5L5 15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </button>
            </div>
            <form id="task-form">
                <div class="form-group">
                    <label for="task-title">업무 제목</label>
                    <input type="text" id="task-title" placeholder="예: 마케팅 보고서 작성" required autocomplete="off" />
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="task-due">기한</label>
                        <input type="date" id="task-due" />
                    </div>
                    <div class="form-group">
                        <label for="task-status">상태</label>
                        <select id="task-status">
                            <option value="todo">할 일</option>
                            <option value="in-progress">진행 중</option>
                            <option value="done">완료</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>세부 업무</label>
                    <div class="subtask-list" id="modal-subtask-list"></div>
                    <div class="add-subtask-row">
                        <input type="text" id="subtask-input" placeholder="세부 업무 입력 후 Enter" autocomplete="off" />
                        <button type="button" class="btn-add-subtask" id="btn-add-subtask">추가</button>
                    </div>
                </div>
                <input type="hidden" id="task-id" />
                <div class="modal-actions">
                    <button type="button" class="btn-cancel" id="btn-cancel">취소</button>
                    <button type="submit" class="btn-save" id="btn-save">저장</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ============ Delete Confirmation Modal ============ -->
    <div class="modal-overlay" id="delete-modal-overlay" style="display: none;">
        <div class="modal modal-small" id="delete-modal">
            <div class="modal-header">
                <h2>업무 삭제</h2>
            </div>
            <p class="delete-message">이 업무를 삭제하시겠습니까?<br>삭제 후 복구할 수 없습니다.</p>
            <div class="modal-actions">
                <button class="btn-cancel" id="delete-cancel">취소</button>
                <button class="btn-delete" id="delete-confirm">삭제</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast-container" id="toast-container"></div>

    <script type="module" src="app.js"></script>
</body>
</html>
