<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowTask — 인터랙티브 체험</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #08080f;
            --purple: #6C5CE7;
            --pink: #fd79a8;
            --teal: #00cec9;
            --yellow: #fdcb6e;
            --font: 'Inter', sans-serif;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: #f0f0f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Ambient glow */
        body::before {
            content: '';
            position: fixed;
            top: -200px; left: -200px;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(108,92,231,0.07), transparent 70%);
            pointer-events: none;
        }

        .container {
            max-width: 700px;
            width: 100%;
            padding: 40px 20px 80px;
        }

        h1 {
            text-align: center;
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: -0.04em;
            margin-bottom: 8px;
        }
        h1 span {
            background: linear-gradient(135deg, #6C5CE7, #a29bfe, #fd79a8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            text-align: center;
            color: #5a5a78;
            font-size: 0.9rem;
            margin-bottom: 48px;
        }

        /* ── Interactive Task Card ── */
        .task-demo {
            background: rgba(22,22,38,0.6);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 20px;
            padding: 32px;
            margin-bottom: 32px;
            backdrop-filter: blur(12px);
            position: relative;
            overflow: hidden;
            transition: border-color 0.3s ease;
        }
        .task-demo:hover { border-color: rgba(255,255,255,0.12); }

        /* Left accent bar */
        .task-demo::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 4px; height: 100%;
            background: var(--purple);
            border-radius: 0 4px 4px 0;
            transition: background 0.5s ease;
        }
        .task-demo.status-progress::before { background: var(--yellow); }
        .task-demo.status-done::before { background: var(--teal); }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .task-title-text {
            font-size: 1.15rem;
            font-weight: 700;
            transition: all 0.3s ease;
        }
        .task-demo.status-done .task-title-text {
            text-decoration: line-through;
            color: #5a5a78;
        }

        /* Status badge - clickable */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.78rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            user-select: none;
            border: none;
            font-family: var(--font);
        }
        .status-badge:hover { transform: scale(1.05); }
        .status-badge:active { transform: scale(0.97); }

        .status-badge.todo { background: rgba(99,110,138,0.15); color: #636e8a; }
        .status-badge.in-progress { background: rgba(253,203,110,0.15); color: #fdcb6e; }
        .status-badge.done { background: rgba(0,206,201,0.15); color: #00cec9; }

        .status-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: currentColor;
        }
        .status-badge.in-progress .status-dot {
            animation: pulse 1.5s ease infinite;
        }

        /* Due date */
        .due-row {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.82rem;
            color: #8888a8;
            margin-bottom: 20px;
        }

        /* Progress bar */
        .progress-wrap { margin-bottom: 24px; }
        .progress-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: #5a5a78;
            margin-bottom: 6px;
        }
        .progress-track {
            height: 6px;
            background: rgba(255,255,255,0.04);
            border-radius: 50px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            border-radius: 50px;
            background: linear-gradient(90deg, #6C5CE7, #a29bfe);
            width: 0%;
            transition: width 0.6s cubic-bezier(0.16,1,0.3,1), background 0.5s ease;
        }
        .progress-fill.complete {
            background: linear-gradient(90deg, #00cec9, #55efc4);
        }

        /* Subtask items */
        .subtask {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            cursor: pointer;
            transition: opacity 0.3s ease;
            user-select: none;
        }
        .subtask:last-child { border-bottom: none; }
        .subtask:hover { opacity: 0.85; }

        .check-box {
            width: 22px; height: 22px;
            border-radius: 6px;
            border: 2px solid rgba(255,255,255,0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .subtask.checked .check-box {
            background: var(--purple);
            border-color: var(--purple);
        }

        /* SVG checkmark inside */
        .check-svg {
            position: absolute;
            width: 14px; height: 14px;
        }
        .check-svg path {
            stroke: white;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
            stroke-dasharray: 20;
            stroke-dashoffset: 20;
            transition: stroke-dashoffset 0.35s ease;
        }
        .subtask.checked .check-svg path {
            stroke-dashoffset: 0;
        }

        .subtask-label {
            font-size: 0.9rem;
            color: #b0b0c8;
            transition: all 0.3s ease;
        }
        .subtask.checked .subtask-label {
            text-decoration: line-through;
            color: #5a5a78;
        }

        /* ── Particle Canvas ── */
        #particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9999;
        }

        /* ── Guide text ── */
        .guide {
            text-align: center;
            padding: 16px;
            background: rgba(108,92,231,0.08);
            border: 1px solid rgba(108,92,231,0.15);
            border-radius: 12px;
            font-size: 0.85rem;
            color: #a29bfe;
            margin-bottom: 32px;
            animation: fadeIn 0.6s ease;
        }

        /* ── Celebration overlay ── */
        .celebration {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(8,8,15,0.9);
            z-index: 10000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        .celebration.active {
            opacity: 1;
            pointer-events: auto;
        }
        .celebration h2 {
            font-size: 2rem;
            font-weight: 900;
            margin-bottom: 12px;
            animation: bounceIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55) both;
        }
        .celebration p { color: #8888a8; margin-bottom: 24px; }
        .celebration button {
            padding: 12px 28px;
            background: linear-gradient(135deg, #6C5CE7, #a29bfe);
            border: none; color: white;
            font-family: var(--font);
            font-size: 0.9rem; font-weight: 700;
            border-radius: 50px; cursor: pointer;
            box-shadow: 0 4px 20px rgba(108,92,231,0.3);
        }

        /* ── Draggable hint ── */
        .drag-area {
            margin-bottom: 32px;
        }
        .drag-area h3 {
            font-size: 0.85rem;
            color: #5a5a78;
            margin-bottom: 16px;
            text-align: center;
        }
        .drag-tasks {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .drag-chip {
            padding: 10px 20px;
            background: rgba(22,22,38,0.8);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            font-size: 0.85rem;
            color: #b0b0c8;
            cursor: grab;
            transition: all 0.3s ease;
            user-select: none;
        }
        .drag-chip:hover {
            border-color: var(--purple);
            background: rgba(108,92,231,0.08);
            transform: translateY(-2px);
        }
        .drag-chip:active { cursor: grabbing; transform: scale(0.95); }
        .drag-chip.dragging {
            opacity: 0.5;
            transform: scale(0.9);
        }

        .drop-zone {
            min-height: 60px;
            border: 2px dashed rgba(255,255,255,0.08);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #3a3a58;
            font-size: 0.82rem;
            margin-top: 16px;
            transition: all 0.3s ease;
            gap: 8px;
            flex-wrap: wrap;
            padding: 12px;
        }
        .drop-zone.over {
            border-color: var(--purple);
            background: rgba(108,92,231,0.06);
            color: #a29bfe;
        }
        .drop-zone .drag-chip {
            cursor: default;
            border-color: var(--purple);
            background: rgba(108,92,231,0.12);
            color: #a29bfe;
        }

        /* ── SVG Drawing Pad ── */
        .draw-section { margin-bottom: 32px; }
        .draw-section h3 {
            font-size: 0.85rem;
            color: #5a5a78;
            margin-bottom: 16px;
            text-align: center;
        }

        .draw-canvas-wrap {
            background: rgba(22,22,38,0.5);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            overflow: hidden;
            cursor: crosshair;
            position: relative;
        }
        #draw-canvas {
            display: block;
            width: 100%;
            height: 250px;
        }
        .draw-tools {
            display: flex;
            gap: 8px;
            justify-content: center;
            padding: 12px;
            border-top: 1px solid rgba(255,255,255,0.04);
        }
        .color-btn {
            width: 28px; height: 28px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .color-btn:hover { transform: scale(1.2); }
        .color-btn.active { border-color: white; transform: scale(1.15); }
        .clear-btn {
            padding: 4px 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #8888a8;
            font-family: var(--font);
            font-size: 0.75rem;
            border-radius: 50px;
            cursor: pointer;
            margin-left: 12px;
        }
        .clear-btn:hover { background: rgba(255,255,255,0.1); color: #f0f0f5; }

        /* ── Animations ── */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            60% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); }
        }
        @keyframes confetti-fall {
            0% { transform: translateY(-10px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        @media (max-width: 640px) {
            h1 { font-size: 1.4rem; }
            .task-demo { padding: 20px; }
        }
    </style>
</head>
<body>

<canvas id="particles"></canvas>

<div class="container">
    <h1>FlowTask <span>인터랙티브 체험</span></h1>
    <p class="subtitle">직접 클릭하고 드래그해 보세요!</p>

    <!-- Guide -->
    <div class="guide" id="guide">
        👇 아래 세부업무를 <strong>클릭</strong>해서 체크해 보세요. 상태 배지도 클릭 가능!
    </div>

    <!-- Interactive Task Card -->
    <div class="task-demo" id="task-card">
        <div class="task-header">
            <span class="task-title-text" id="task-title">마케팅 보고서 작성</span>
            <button class="status-badge todo" id="status-badge">
                <span class="status-dot"></span>
                <span id="status-text">할 일</span>
            </button>
        </div>

        <div class="due-row">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <circle cx="7" cy="7" r="5.5" stroke="currentColor" stroke-width="1.2"/>
                <path d="M7 4v3.5l2.5 1.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
            </svg>
            5월 28일 (수) — 3일 남음
        </div>

        <div class="progress-wrap">
            <div class="progress-header">
                <span>진행률</span>
                <span id="progress-text">0/4</span>
            </div>
            <div class="progress-track">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
        </div>

        <div id="subtask-list">
            <div class="subtask" data-index="0">
                <div class="check-box">
                    <svg class="check-svg" viewBox="0 0 14 14"><path d="M3 7l3 3 5-5"/></svg>
                </div>
                <span class="subtask-label">데이터 수집</span>
            </div>
            <div class="subtask" data-index="1">
                <div class="check-box">
                    <svg class="check-svg" viewBox="0 0 14 14"><path d="M3 7l3 3 5-5"/></svg>
                </div>
                <span class="subtask-label">차트 그래프 제작</span>
            </div>
            <div class="subtask" data-index="2">
                <div class="check-box">
                    <svg class="check-svg" viewBox="0 0 14 14"><path d="M3 7l3 3 5-5"/></svg>
                </div>
                <span class="subtask-label">보고서 초안 작성</span>
            </div>
            <div class="subtask" data-index="3">
                <div class="check-box">
                    <svg class="check-svg" viewBox="0 0 14 14"><path d="M3 7l3 3 5-5"/></svg>
                </div>
                <span class="subtask-label">팀장 리뷰 요청</span>
            </div>
        </div>
    </div>

    <!-- Drag & Drop -->
    <div class="drag-area">
        <h3>🎯 드래그 앤 드롭으로 우선순위 정리</h3>
        <div class="drag-tasks" id="drag-source">
            <div class="drag-chip" draggable="true" data-task="weekly">📊 주간 보고</div>
            <div class="drag-chip" draggable="true" data-task="meeting">📅 회의 준비</div>
            <div class="drag-chip" draggable="true" data-task="email">📧 이메일 정리</div>
            <div class="drag-chip" draggable="true" data-task="review">🔍 코드 리뷰</div>
        </div>
        <div class="drop-zone" id="drop-zone">여기에 드래그해서 놓으세요</div>
    </div>

    <!-- Drawing Pad -->
    <div class="draw-section">
        <h3>🎨 SVG 자유 드로잉</h3>
        <div class="draw-canvas-wrap">
            <svg id="draw-canvas" xmlns="http://www.w3.org/2000/svg"></svg>
            <div class="draw-tools">
                <button class="color-btn active" style="background:#a29bfe" data-color="#a29bfe"></button>
                <button class="color-btn" style="background:#fd79a8" data-color="#fd79a8"></button>
                <button class="color-btn" style="background:#00cec9" data-color="#00cec9"></button>
                <button class="color-btn" style="background:#fdcb6e" data-color="#fdcb6e"></button>
                <button class="color-btn" style="background:#f0f0f5" data-color="#f0f0f5"></button>
                <button class="clear-btn" id="clear-draw">지우기</button>
            </div>
        </div>
    </div>
</div>

<!-- Celebration -->
<div class="celebration" id="celebration">
    <h2>🎉 모든 업무 완료!</h2>
    <p>FlowTask로 이렇게 쉽게 관리할 수 있어요</p>
    <button onclick="resetAll()">다시 해보기</button>
</div>

<script>
// ── Subtask Toggle ──
const subtasks = document.querySelectorAll('.subtask');
const progressFill = document.getElementById('progress-fill');
const progressText = document.getElementById('progress-text');
const taskCard = document.getElementById('task-card');
const statusBadge = document.getElementById('status-badge');
const statusTextEl = document.getElementById('status-text');
const celebration = document.getElementById('celebration');
const guide = document.getElementById('guide');

let checkedCount = 0;
const totalSubtasks = subtasks.length;

subtasks.forEach(st => {
    st.addEventListener('click', () => {
        st.classList.toggle('checked');
        checkedCount = document.querySelectorAll('.subtask.checked').length;
        updateProgress();
        
        // Particle burst
        const rect = st.getBoundingClientRect();
        if (st.classList.contains('checked')) {
            createParticles(rect.left + 11, rect.top + 11, '#a29bfe');
        }
    });
});

function updateProgress() {
    const pct = (checkedCount / totalSubtasks) * 100;
    progressFill.style.width = pct + '%';
    progressText.textContent = `${checkedCount}/${totalSubtasks}`;

    if (pct === 100) {
        progressFill.classList.add('complete');
        setStatus('done');
        setTimeout(() => {
            celebration.classList.add('active');
            createConfetti();
        }, 600);
    } else if (checkedCount > 0) {
        progressFill.classList.remove('complete');
        setStatus('in-progress');
    } else {
        progressFill.classList.remove('complete');
        setStatus('todo');
    }

    // Update guide
    if (checkedCount === 1 && !guide.dataset.updated) {
        guide.innerHTML = '👆 상단의 <strong>상태 배지</strong>를 클릭하면 상태를 수동 전환할 수도 있어요!';
        guide.dataset.updated = '1';
    }
}

function setStatus(status) {
    taskCard.className = 'task-demo';
    statusBadge.className = 'status-badge';
    
    if (status === 'todo') {
        taskCard.classList.add('status-todo');
        statusBadge.classList.add('todo');
        statusTextEl.textContent = '할 일';
    } else if (status === 'in-progress') {
        taskCard.classList.add('status-progress');
        statusBadge.classList.add('in-progress');
        statusTextEl.textContent = '진행 중';
    } else {
        taskCard.classList.add('status-done');
        statusBadge.classList.add('done');
        statusTextEl.textContent = '완료';
    }
}

// Status badge click
const statusCycle = ['todo', 'in-progress', 'done'];
let currentStatusIdx = 0;
statusBadge.addEventListener('click', (e) => {
    e.stopPropagation();
    currentStatusIdx = (currentStatusIdx + 1) % 3;
    setStatus(statusCycle[currentStatusIdx]);
    createParticles(e.clientX, e.clientY, 
        currentStatusIdx === 0 ? '#636e8a' : currentStatusIdx === 1 ? '#fdcb6e' : '#00cec9');
});

// ── Particle System ──
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let particles = [];

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function createParticles(x, y, color, count = 12) {
    for (let i = 0; i < count; i++) {
        particles.push({
            x, y,
            vx: (Math.random() - 0.5) * 8,
            vy: (Math.random() - 0.5) * 8 - 2,
            size: Math.random() * 4 + 2,
            color,
            life: 1,
            decay: Math.random() * 0.02 + 0.015,
        });
    }
}

function createConfetti() {
    const colors = ['#6C5CE7', '#a29bfe', '#fd79a8', '#00cec9', '#fdcb6e', '#55efc4'];
    for (let i = 0; i < 80; i++) {
        particles.push({
            x: Math.random() * canvas.width,
            y: -20,
            vx: (Math.random() - 0.5) * 4,
            vy: Math.random() * 4 + 2,
            size: Math.random() * 6 + 3,
            color: colors[Math.floor(Math.random() * colors.length)],
            life: 1,
            decay: Math.random() * 0.005 + 0.003,
            rotation: Math.random() * 360,
            rotSpeed: (Math.random() - 0.5) * 10,
        });
    }
}

function animateParticles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles = particles.filter(p => p.life > 0);
    particles.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.1;
        p.life -= p.decay;

        ctx.save();
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        if (p.rotation !== undefined) {
            ctx.translate(p.x, p.y);
            p.rotation += p.rotSpeed;
            ctx.rotate(p.rotation * Math.PI / 180);
            ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size * 0.6);
        } else {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.restore();
    });
    requestAnimationFrame(animateParticles);
}
animateParticles();

// ── Drag & Drop ──
const dragSource = document.getElementById('drag-source');
const dropZone = document.getElementById('drop-zone');
let draggedEl = null;

document.querySelectorAll('.drag-chip').forEach(chip => {
    chip.addEventListener('dragstart', (e) => {
        draggedEl = chip;
        chip.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
    });
    chip.addEventListener('dragend', () => {
        chip.classList.remove('dragging');
        draggedEl = null;
    });
});

dropZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropZone.classList.add('over');
});
dropZone.addEventListener('dragleave', () => {
    dropZone.classList.remove('over');
});
dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('over');
    if (draggedEl && draggedEl.parentElement === dragSource) {
        const clone = draggedEl.cloneNode(true);
        clone.draggable = false;
        dropZone.appendChild(clone);
        draggedEl.remove();
        
        // Remove placeholder text
        const placeholder = dropZone.childNodes[0];
        if (placeholder && placeholder.nodeType === 3) {
            placeholder.remove();
        }

        createParticles(e.clientX, e.clientY, '#a29bfe', 8);
    }
});

// ── SVG Drawing ──
const drawCanvas = document.getElementById('draw-canvas');
let isDrawing = false;
let currentPath = null;
let drawColor = '#a29bfe';

function getSVGPoint(e) {
    const rect = drawCanvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return {
        x: (clientX - rect.left) * (drawCanvas.viewBox.baseVal.width || rect.width) / rect.width,
        y: (clientY - rect.top) * (drawCanvas.viewBox.baseVal.height || rect.height) / rect.height
    };
}

function startDraw(e) {
    e.preventDefault();
    isDrawing = true;
    const pt = getSVGPoint(e);
    currentPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    currentPath.setAttribute('stroke', drawColor);
    currentPath.setAttribute('stroke-width', '3');
    currentPath.setAttribute('fill', 'none');
    currentPath.setAttribute('stroke-linecap', 'round');
    currentPath.setAttribute('stroke-linejoin', 'round');
    currentPath.setAttribute('d', `M${pt.x},${pt.y}`);
    drawCanvas.appendChild(currentPath);
}

function doDraw(e) {
    if (!isDrawing || !currentPath) return;
    e.preventDefault();
    const pt = getSVGPoint(e);
    const d = currentPath.getAttribute('d');
    currentPath.setAttribute('d', d + ` L${pt.x},${pt.y}`);
}

function endDraw() {
    isDrawing = false;
    if (currentPath) {
        // Animate the drawn path
        const length = currentPath.getTotalLength();
        currentPath.style.strokeDasharray = length;
        currentPath.style.strokeDashoffset = length;
        currentPath.style.animation = 'none';
        currentPath.offsetHeight;
        currentPath.style.transition = `stroke-dashoffset 0.5s ease`;
        currentPath.style.strokeDashoffset = '0';
    }
    currentPath = null;
}

drawCanvas.addEventListener('mousedown', startDraw);
drawCanvas.addEventListener('mousemove', doDraw);
drawCanvas.addEventListener('mouseup', endDraw);
drawCanvas.addEventListener('mouseleave', endDraw);
drawCanvas.addEventListener('touchstart', startDraw, { passive: false });
drawCanvas.addEventListener('touchmove', doDraw, { passive: false });
drawCanvas.addEventListener('touchend', endDraw);

// Set viewBox
const rect = drawCanvas.getBoundingClientRect();
drawCanvas.setAttribute('viewBox', `0 0 ${rect.width} ${rect.height}`);

// Color buttons
document.querySelectorAll('.color-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        drawColor = btn.dataset.color;
    });
});

// Clear drawing
document.getElementById('clear-draw').addEventListener('click', () => {
    while (drawCanvas.firstChild) drawCanvas.removeChild(drawCanvas.firstChild);
});

// ── Reset ──
function resetAll() {
    celebration.classList.remove('active');
    subtasks.forEach(st => st.classList.remove('checked'));
    checkedCount = 0;
    currentStatusIdx = 0;
    setStatus('todo');
    updateProgress();
    guide.innerHTML = '👇 아래 세부업무를 <strong>클릭</strong>해서 체크해 보세요. 상태 배지도 클릭 가능!';
    guide.dataset.updated = '';
}
</script>
